name: Build

on:
  push:
    branches:
      - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    container:
      image: ghcr.io/formalsec/ocaml-5.4-cvc5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Submodules
        run: git submodule update --init vendor/graphjs vendor/ECMA-SL

      - name: Install dependencies
        run: opam install -y . --deps-only --with-test

      - name: Run lint
        run: ./scripts/lint.sh

      - name: Build
        run: dune build @install

      - name: Test
        run: dune runtest -j 1
